<style>
:root {
  --purple-1:#2e1065;--purple-2:#4c1d95;--purple-3:#6d28d9;--purple-4:#7c3aed;--purple-5:#a78bfa;--purple-6:#ede9fe;
  --zinc-50:#fafafa;--zinc-100:#f4f4f5;--zinc-200:#e4e4e7;--zinc-300:#d4d4d8;--zinc-400:#a1a1aa;--zinc-500:#71717a;--zinc-600:#52525b;--zinc-700:#3f3f46;--zinc-800:#27272a;--zinc-900:#18181b;--zinc-950:#09090b;

  --bg:#fff;--bg-elev:#fff;--bg-sunken:var(--zinc-50);--bg-muted:var(--zinc-100);
  --fg1:var(--zinc-900);--fg2:var(--zinc-700);--fg3:var(--zinc-500);--fg4:var(--zinc-400);
  --brand:var(--purple-4);--brand-hover:var(--purple-3);--brand-soft:var(--purple-6);--brand-ink:var(--purple-1);
  --border-subtle:var(--zinc-100);--border:var(--zinc-200);--border-strong:var(--zinc-300);
  --focus-ring:color-mix(in oklab, var(--purple-4) 60%, transparent);
  --shadow-sm:0 1px 2px 0 rgba(0,0,0,.05);
  --shadow-md:0 1px 3px 0 rgba(0,0,0,.05), 0 1px 2px -1px rgba(0,0,0,.05);

  --font-display:'Fraunces',Georgia,serif;
  --font-body:'Ubuntu',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',Menlo,monospace;
  --font-arabic:'Amiri',serif;

  --radius-sm:4px;--radius-md:6px;--radius-lg:8px;--radius-xl:12px;
}
[data-theme="dark"] {
  --bg:var(--zinc-950);--bg-elev:var(--zinc-900);--bg-sunken:#0c0c0d;--bg-muted:var(--zinc-800);
  --fg1:var(--zinc-50);--fg2:var(--zinc-300);--fg3:var(--zinc-400);--fg4:var(--zinc-500);
  --brand:var(--purple-5);--brand-hover:var(--purple-6);--brand-soft:color-mix(in oklab,var(--purple-4) 20%,var(--zinc-950));--brand-ink:var(--purple-6);
  --border-subtle:var(--zinc-800);--border:var(--zinc-800);--border-strong:var(--zinc-700);
  --focus-ring:color-mix(in oklab,var(--purple-5) 60%,transparent);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg1); font-family: var(--font-body); -webkit-font-smoothing: antialiased; transition: background 220ms ease, color 220ms ease; }
[lang="ar"], .arabic { font-family: var(--font-arabic); font-size: 1.15em; line-height: 1.85; direction: rtl; unicode-bidi: plaintext; }
a { color: var(--brand); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 0.22em; text-decoration-color: color-mix(in oklab, currentColor 35%, transparent); transition: color 160ms, text-decoration-color 160ms; }
a:hover { color: var(--brand-hover); text-decoration-color: currentColor; }
a:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; border-radius: 2px; }

/* NAV */
.site-nav { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 14px 40px; background: color-mix(in oklab, var(--bg) 85%, transparent); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
.site-nav__brand { font-family: var(--font-display); font-weight: 600; font-size: 18px; letter-spacing: -0.02em; color: var(--fg1); text-decoration: none; font-variation-settings: 'opsz' 72; }
.site-nav__dot { color: var(--brand); }
.site-nav__links { display: flex; gap: 4px; }
.site-nav__link { font-family: var(--font-body); font-size: 14px; font-weight: 500; color: var(--fg3); text-decoration: none; padding: 6px 12px; border-radius: var(--radius-md); transition: color 120ms, background 120ms; }
.site-nav__link:hover { color: var(--fg1); background: var(--bg-muted); }
.site-nav__link.is-active { color: var(--fg1); background: var(--bg-muted); }
.site-nav__tools { display: flex; gap: 4px; }
.icon-btn { width: 36px; height: 36px; border-radius: var(--radius-md); border: 1px solid transparent; background: transparent; color: var(--fg2); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: background 120ms, color 120ms, border-color 120ms; }
.icon-btn:hover { background: var(--bg-muted); color: var(--fg1); }
.icon-btn i { width: 16px; height: 16px; }

.screen { max-width: 1200px; margin: 0 auto; padding: 56px 40px 96px; }
.screen--article, .screen--about { max-width: 720px; }

/* HERO */
.hero { padding: 24px 0 48px; }
.hero__kicker { font-family: var(--font-body); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg3); margin-bottom: 20px; }
.hero__title { font-family: var(--font-display); font-weight: 600; font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1.05; letter-spacing: -0.025em; color: var(--fg1); margin: 0 0 20px; font-variation-settings: 'opsz' 144; }
.hero__title em { font-style: italic; color: var(--brand); }
.hero__lede { font-family: var(--font-body); font-size: 18px; font-weight: 400; line-height: 1.65; color: var(--fg2); max-width: 60ch; margin: 0; }

/* FEATURE CARD — shadcn card: border, very subtle bg, no heavy color */
.feature-card { position: relative; overflow: hidden; cursor: pointer; background: var(--bg-elev); color: var(--fg1); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 40px; margin-bottom: 56px; transition: border-color 160ms, box-shadow 160ms; }
.feature-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); }
.feature-card__kicker { font-family: var(--font-body); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brand); margin-bottom: 16px; display: inline-flex; align-items: center; gap: 8px; }
.feature-card__kicker::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--brand); }
.feature-card__title { font-family: var(--font-display); font-size: clamp(1.875rem, 3.5vw, 2.5rem); font-weight: 600; line-height: 1.15; letter-spacing: -0.02em; margin: 0 0 14px; color: var(--fg1); font-variation-settings: 'opsz' 96; }
.feature-card__lede { font-family: var(--font-body); font-size: 17px; line-height: 1.65; color: var(--fg2); max-width: 62ch; margin: 0 0 20px; }
.feature-card__byline { font-family: var(--font-body); font-size: 13px; color: var(--fg3); }

/* ARTICLE CARDS GRID */
.article-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 32px 28px; margin-bottom: 72px; }
.article-card { cursor: pointer; padding: 24px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius-lg); transition: border-color 160ms, box-shadow 160ms, transform 160ms; display: flex; flex-direction: column; gap: 10px; }
.article-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
.article-card:hover .article-card__title { color: var(--brand); }
.article-card__kicker { font-family: var(--font-body); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg3); margin-bottom: 2px; }
.article-card__title { font-family: var(--font-display); font-size: 22px; font-weight: 600; line-height: 1.22; letter-spacing: -0.015em; color: var(--fg1); margin: 0; transition: color 160ms; font-variation-settings: 'opsz' 72; }
.article-card__lede { font-family: var(--font-body); font-size: 14px; line-height: 1.6; color: var(--fg2); margin: 0; flex: 1; }
.article-card__byline { font-family: var(--font-body); font-size: 12px; color: var(--fg3); padding-top: 8px; border-top: 1px solid var(--border-subtle); margin-top: 4px; }

/* NEWSLETTER */
.newsletter { margin: 72px 0 0; padding: 48px 40px; border-radius: var(--radius-xl); border: 1px solid var(--border); background: var(--bg-sunken); }
.newsletter--hero { background: var(--bg-elev); }
.newsletter__inner { max-width: 520px; margin: 0 auto; text-align: center; }
.newsletter__kicker { font-family: var(--font-body); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brand); margin-bottom: 12px; }
.newsletter__title { font-family: var(--font-display); font-size: 32px; font-weight: 600; line-height: 1.18; letter-spacing: -0.02em; margin: 0 0 12px; color: var(--fg1); font-variation-settings: 'opsz' 72; }
.newsletter__lede { font-family: var(--font-body); font-size: 15px; line-height: 1.6; color: var(--fg2); margin: 0 0 24px; }
.newsletter__form { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.newsletter__input { font-family: var(--font-body); font-size: 14px; padding: 0 12px; height: 36px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius-md); color: var(--fg1); min-width: 280px; outline: none; transition: border-color 120ms, box-shadow 120ms; }
.newsletter__input::placeholder { color: var(--fg4); }
.newsletter__input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--focus-ring); }
.newsletter__done { font-family: var(--font-body); font-size: 14px; color: var(--fg1); padding: 8px; }
.newsletter__meta { font-family: var(--font-body); font-size: 12px; color: var(--fg3); margin-top: 20px; }

/* BUTTON — shadcn: compact, medium weight, 6px radius */
.btn { font-family: var(--font-body); font-size: 14px; font-weight: 500; height: 36px; padding: 0 16px; border: 1px solid transparent; border-radius: var(--radius-md); cursor: pointer; transition: background 120ms, color 120ms, border-color 120ms; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
.btn:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
.btn--primary { background: var(--brand); color: #fff; }
.btn--primary:hover { background: var(--brand-hover); }
.btn--outline { background: var(--bg-elev); color: var(--fg1); border-color: var(--border); }
.btn--outline:hover { background: var(--bg-muted); }
.btn--ghost { background: transparent; color: var(--fg1); }
.btn--ghost:hover { background: var(--bg-muted); }

/* ARTICLE READING */
.article-head { margin-bottom: 40px; }
.back-link { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body); font-size: 13px; color: var(--fg3); background: none; border: none; cursor: pointer; padding: 6px 10px 6px 8px; margin-bottom: 24px; margin-left: -10px; border-radius: var(--radius-md); transition: color 120ms, background 120ms; }
.back-link:hover { color: var(--fg1); background: var(--bg-muted); }
.back-link i { width: 14px; height: 14px; }
.article-head__kicker { font-family: var(--font-body); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brand); margin-bottom: 16px; display: inline-flex; align-items: center; gap: 8px; }
.article-head__kicker::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.article-head__title { font-family: var(--font-display); font-size: clamp(2rem, 4.5vw, 3rem); font-weight: 600; line-height: 1.1; letter-spacing: -0.02em; color: var(--fg1); margin: 0 0 20px; font-variation-settings: 'opsz' 144; }
.article-head__lede { font-family: var(--font-body); font-size: 19px; font-weight: 400; line-height: 1.6; color: var(--fg2); margin: 0 0 28px; }
.article-head__byline { font-family: var(--font-body); font-size: 13px; color: var(--fg3); padding-bottom: 28px; border-bottom: 1px solid var(--border); }

.article-body > * + * { margin-top: 1.4em; }
.article-body p { font-family: var(--font-body); font-size: 17px; line-height: 1.75; color: var(--fg1); margin: 0; }
.article-body h2 { font-family: var(--font-display); font-size: 26px; font-weight: 600; line-height: 1.25; letter-spacing: -0.015em; color: var(--fg1); margin: 2.25em 0 0; font-variation-settings: 'opsz' 72; }
.pull-quote { margin: 1.75em 0; padding: 20px 24px; border-left: 2px solid var(--brand); background: var(--bg-sunken); border-radius: 0 var(--radius-md) var(--radius-md) 0; font-family: var(--font-display); font-size: 22px; font-style: italic; font-weight: 400; line-height: 1.4; color: var(--fg1); font-variation-settings: 'opsz' 72, 'SOFT' 50; }
.drop-cap::first-letter { font-family: var(--font-display); font-weight: 700; font-size: 4em; line-height: 0.85; float: left; padding: 0.05em 0.12em 0 0; color: var(--brand); font-variation-settings: 'opsz' 144; }
.article-foot { margin: 56px 0 32px; padding-top: 20px; border-top: 1px solid var(--border); }
.article-foot__meta { font-family: var(--font-body); font-size: 12px; color: var(--fg3); }

/* CATEGORY */
.cat-header { margin-bottom: 48px; max-width: 720px; }
.cat-header__kicker { font-family: var(--font-body); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg3); margin-bottom: 12px; }
.cat-header__title { font-family: var(--font-display); font-size: clamp(2.25rem, 5vw, 3.5rem); font-weight: 600; line-height: 1.05; letter-spacing: -0.025em; margin: 0 0 16px; color: var(--fg1); font-variation-settings: 'opsz' 144; }
.cat-header__lede { font-family: var(--font-body); font-size: 18px; line-height: 1.6; color: var(--fg2); max-width: 60ch; margin: 0; }

/* ABOUT */
.about-head { margin-bottom: 40px; padding-bottom: 32px; border-bottom: 1px solid var(--border); }
.about-head__kicker { font-family: var(--font-body); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brand); margin-bottom: 14px; }
.about-head__title { font-family: var(--font-display); font-size: 48px; font-weight: 600; line-height: 1.05; letter-spacing: -0.025em; margin: 0 0 18px; color: var(--fg1); font-variation-settings: 'opsz' 144; }
.about-head__lede { font-family: var(--font-body); font-size: 18px; line-height: 1.6; color: var(--fg2); max-width: 60ch; margin: 0; }
.about-body p, .about-body li { font-family: var(--font-body); font-size: 16px; line-height: 1.75; color: var(--fg1); }
.about-body p + p, .about-body h2 + ul { margin-top: 1.2em; }
.about-body h2 { font-family: var(--font-display); font-size: 24px; font-weight: 600; margin: 2em 0 0.75em; color: var(--fg1); font-variation-settings: 'opsz' 72; }
.plain-list { padding: 0; list-style: none; display: flex; flex-direction: column; gap: 10px; }
.plain-list li { padding-left: 20px; position: relative; }
.plain-list li::before { content: ''; position: absolute; left: 0; top: 0.7em; width: 8px; height: 1px; background: var(--brand); }

.newsletter-extra { margin-top: 56px; }
.newsletter-extra h2 { font-family: var(--font-display); font-size: 24px; font-weight: 600; margin: 0 0 20px; color: var(--fg1); font-variation-settings: 'opsz' 72; }
.newsletter-extra h2 + .article-grid { margin-bottom: 0; }

/* FOOTER — simple, hairline border, no heavy inverse surface */
.site-footer { margin-top: 96px; border-top: 1px solid var(--border); background: var(--bg-sunken); }
.site-footer__inner { max-width: 1200px; margin: 0 auto; padding: 56px 40px 32px; display: grid; grid-template-columns: 1.2fr 2fr; gap: 56px; }
.site-footer__wordmark { font-family: var(--font-display); font-size: 20px; font-weight: 600; letter-spacing: -0.02em; color: var(--fg1); margin-bottom: 12px; font-variation-settings: 'opsz' 72; }
.site-footer__tagline { font-family: var(--font-body); font-size: 14px; line-height: 1.6; color: var(--fg3); max-width: 36ch; margin: 0; }
.site-footer__cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }
.site-footer__cols > div { display: flex; flex-direction: column; gap: 8px; }
.site-footer__cols a { font-family: var(--font-body); font-size: 14px; color: var(--fg2); text-decoration: none; }
.site-footer__cols a:hover { color: var(--brand); }
.site-footer__label { font-family: var(--font-body); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg3); margin-bottom: 4px; }
.site-footer__note { max-width: 1200px; margin: 0 auto; padding: 20px 40px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-family: var(--font-body); font-size: 12px; color: var(--fg3); }

@media (max-width: 720px) {
  .site-nav { padding: 12px 20px; }
  .site-nav__links { display: none; }
  .screen { padding: 32px 20px 64px; }
  .article-grid { gap: 24px 20px; }
  .feature-card { padding: 28px 24px; }
  .newsletter { padding: 36px 24px; }
  .site-footer__inner { grid-template-columns: 1fr; gap: 40px; padding: 40px 20px 24px; }
  .site-footer__cols { grid-template-columns: 1fr 1fr; }
  .site-footer__note { padding: 16px 20px; flex-direction: column; gap: 8px; }
}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const ARTICLES = [
  { id: 'interest-moral', kicker: 'Economics', title: 'The interest rate as a moral question', lede: 'A short argument on why pricing time is always a claim about what we owe each other — and why that claim needs rehearsing in every generation.', author: 'Azim', date: 'April 18, 2026', readTime: 8 },
  { id: 'sukuk-poetry', kicker: 'Islamic Finance', title: 'On sukūk and poetry', lede: 'I have been thinking about sukūk the way I used to think about poetry — as a form with rules that give it power, not chains that steal it.', author: 'Azim', date: 'April 11, 2026', readTime: 12 },
  { id: 'riba-deeper', kicker: 'Islamic Finance', title: 'Ribā goes deeper than interest', lede: 'The prohibition names a specific kind of asymmetry; to flatten it into a ban on percentage points is to miss what it was protecting.', author: 'Azim', date: 'April 4, 2026', readTime: 10 },
  { id: 'central-bank-faith', kicker: 'Finance', title: 'Central banks require a kind of faith', lede: 'Monetary policy works because we believe it will. That is not a bug, it is the whole machine — which makes trust the scarcest resource of all.', author: 'Azim', date: 'March 28, 2026', readTime: 7 },
  { id: 'kuala-lumpur-window', kicker: 'Crazy Thoughts', title: 'What a window in KL taught me about markets', lede: 'A small observation about condensation, rent, and the way prices hide the life behind them.', author: 'Azim', date: 'March 21, 2026', readTime: 5 },

    { key: 'essays', label: 'Essays' },

      <nav className="site-nav__links">
        {items.map((it) => (
          <a key={it.key} href="#" onClick={(e) => { e.preventDefault(); onNav(it.key); }}

          <i data-lucide={theme === 'dark' ? 'sun' : 'moon'}></i>
        </button>
      </div>
    </header>

};

const Footer = () => (
  <footer className="site-footer">
    <div className="site-footer__inner">
      <div>
        <div className="site-footer__wordmark">azim<span style={{ color: 'var(--brand)' }}>.</span></div>

      </div>
      <div className="site-footer__cols">
        <div><div className="site-footer__label">Read</div><a href="#">All essays</a><a href="#">Islamic Finance</a><a href="#">Economics</a><a href="#">Finance</a><a href="#">Crazy Thoughts</a></div>
        <div><div className="site-footer__label">Follow</div><a href="#">Email newsletter</a><a href="#">RSS</a><a href="#">Twitter / X</a><a href="#">LinkedIn</a></div>
        <div><div className="site-footer__label">This site</div><a href="#">About</a><a href="#">Colophon</a><a href="#">Contact</a></div>
      </div>
    </div>
    <div className="site-footer__note">
      <span>Written in Kuala Lumpur.</span>
      <span>© {new Date().getFullYear()} M Azim Abdul Majeed</span>
    </div>
  </footer>
);

const ArticleCard = ({ article, onOpen }) => (
  <article className="article-card" onClick={() => onOpen && onOpen(article.id)} role="link" tabIndex={0}>
    <div className="article-card__kicker">{article.kicker} · {article.readTime} min</div>
    <h3 className="article-card__title">{article.title}</h3>
    <p className="article-card__lede">{article.lede}</p>
    <div className="article-card__byline">{article.author} · {article.date}</div>
  </article>
);

const FeatureCard = ({ article, onOpen }) => (
  <article className="feature-card" onClick={() => onOpen && onOpen(article.id)} role="link" tabIndex={0}>
    <div className="feature-card__kicker">Featured · {article.kicker} · {article.readTime} min</div>
    <h2 className="feature-card__title">{article.title}</h2>
    <p className="feature-card__lede">{article.lede}</p>
    <div className="feature-card__byline">{article.author} · {article.date}</div>
  </article>
);

const Newsletter = ({ variant = 'soft' }) => {
  const [email, setEmail] = useState('');
  const [state, setState] = useState('idle');
  return (
    <section className={'newsletter newsletter--' + variant}>
      <div className="newsletter__inner">
        <div className="newsletter__kicker">The weekly digest</div>
        <h2 className="newsletter__title">One essay a week, sent on Sunday.</h2>
        <p className="newsletter__lede">A single piece on economics, finance, or Islamic finance. No tracking, no list-sharing. Unsubscribe anytime.</p>
        {state === 'idle' ? (
          <form className="newsletter__form" onSubmit={(e) => { e.preventDefault(); if (email) setState('done'); }}>
            <input type="email" required placeholder="your@email.com" value={email} onChange={(e) => setEmail(e.target.value)} className="newsletter__input" />
            <button type="submit" className="btn btn--primary">Subscribe</button>
          </form>
        ) : (
          <div className="newsletter__done">Thanks — check <em>{email}</em> for a confirmation link.</div>
        )}
        <div className="newsletter__meta">2,400+ readers · weekly since 2023</div>
      </div>
    </section>
  );
};

const HomeScreen = ({ onOpen }) => (
  <div className="screen">
    <section className="hero">
      <div className="hero__kicker">Essays by Azim · since 2023</div>
      <h1 className="hero__title">On <em>money</em>, <em>markets</em>,<br/>and what we owe each other.</h1>
      <p className="hero__lede">Long-form essays on economics, finance, and Islamic finance — plus the occasional thought that will not leave me alone.</p>
    </section>
    <FeatureCard article={ARTICLES[0]} onOpen={onOpen} />
    <div className="article-grid">
      {ARTICLES.slice(1).map((a) => <ArticleCard key={a.id} article={a} onOpen={onOpen} />)}
    </div>
    <Newsletter variant="soft" />
  </div>
);

const CategoryScreen = ({ category, onOpen }) => {
  const label = { islamic: 'Islamic Finance', economics: 'Economics', finance: 'Finance', crazy: 'Crazy Thoughts' }[category] || 'Essays';
  const filter = { islamic: (a) => a.kicker === 'Islamic Finance', economics: (a) => a.kicker === 'Economics', finance: (a) => a.kicker === 'Finance', crazy: (a) => a.kicker === 'Crazy Thoughts' }[category] || (() => true);
  const items = ARTICLES.filter(filter);
  const ledes = { islamic: 'Essays on ribā, sukūk, and the moral architecture of money in the Islamic tradition.', economics: 'On markets, prices, and the political economy beneath them.', finance: 'On banks, rates, and the instruments that move the modern world.', crazy: 'Things I cannot stop thinking about that do not quite fit the other categories.' };
  return (
    <div className="screen">
      <header className="cat-header">
        <div className="cat-header__kicker">Category</div>
        <h1 className="cat-header__title">{label}</h1>
        <p className="cat-header__lede">{ledes[category] || 'Everything I have written, newest first.'}</p>
      </header>
      <div className="article-grid">
        {items.map((a) => <ArticleCard key={a.id} article={a} onOpen={onOpen} />)}
      </div>
    </div>
  );
};

const ArticleScreen = ({ id, onBack }) => {
  const article = ARTICLES.find((a) => a.id === id) || ARTICLES[0];
  return (
    <div className="screen screen--article">
      <div className="article-head">
        <button className="back-link" onClick={onBack}><i data-lucide="arrow-left"></i> All essays</button>
        <div className="article-head__kicker">{article.kicker} · {article.readTime} min read</div>
        <h1 className="article-head__title">{article.title}</h1>
        <p className="article-head__lede">{article.lede}</p>
        <div className="article-head__byline">By <strong style={{ color: 'var(--fg1)', fontWeight: 500 }}>{article.author}</strong> · {article.date}</div>
      </div>
      <div className="article-body">
        <p className="drop-cap">I grew up hearing that <em>ribā</em> was forbidden, and for a long time I carried the prohibition without examining it — the way you carry a family photograph you cannot quite remember posing for. It was only later, when I started reading the jurists, that I realised the prohibition is not really about a number. It is about what happens when time itself is sold.</p>
        <p>Consider a loan at five percent. Consider the same loan at fifteen. The moral weight is not in the percentage point; it is in the <em>structure</em> — in the fact that one side of the exchange is asked to bear risk that the other is explicitly relieved of. To charge interest is to price certainty for one party at the cost of certainty for the other. That is a specific kind of asymmetry, and the medieval scholars had a name for it.</p>
        <blockquote className="pull-quote">"The prohibition of <em>ribā</em> isn't a quirk; it's a claim about what money is <em>for</em>."</blockquote>
        <p>The Arabic term <span lang="ar">الرِّبَا</span> shares a root with the verb <em>to grow</em>. Growth, in the agricultural metaphor, requires planting; it requires risk; it requires the possibility of failure. A crop that grows without being planted is not growth, it is miracle or deception.</p>
        <h2>What this means for finance today</h2>
        <p>Modern sukūk, at their best, take this seriously. They are structured so that the investor owns a share of a real thing — a building, a piece of equipment, a river of rents — and the return comes from that thing's performance, not from a promise of timely interest irrespective of outcome.</p>
        <p>What I want to suggest is that the distinction is also not only theological. It is an argument about what a financial system is <em>for</em>, and about what is lost when we forget.</p>
      </div>
      <div className="article-foot"><div className="article-foot__meta">Written in Kuala Lumpur · shared freely · CC BY</div></div>
      <Newsletter variant="soft" />
    </div>
  );
};

const AboutScreen = () => (
  <div className="screen screen--about">
    <header className="about-head">
      <div className="about-head__kicker">About</div>
      <h1 className="about-head__title">M Azim Abdul Majeed</h1>
      <p className="about-head__lede">I write about economics, finance, and Islamic finance — and I reserve a small corner of the site for thoughts that refuse to fit anywhere else.</p>
    </header>
    <div className="about-body">
      <p>I have spent most of my working life at the edge of two traditions — the quantitative vocabulary of modern finance, and the scholarly tradition of Islamic jurisprudence on exchange. Much of what I write here is an attempt to hold them in the same sentence.</p>
      <p>The site is a personal project. There is no sponsor, no paywall, no tracking. If you want to get in touch, the email is in the footer; if you want to subscribe, the button is everywhere.</p>
      <h2>Frequently written about</h2>
      <ul className="plain-list">
        <li><strong>Ribā, gharar, and the moral geometry of exchange.</strong></li>
        <li><strong>Sukūk as an institutional form</strong> — what works, what does not, and why.</li>
        <li><strong>Central banks, trust, and the politics of monetary credibility.</strong></li>
        <li><strong>Development economics</strong> and the quiet violence of poor policy.</li>
      </ul>
      <h2>Elsewhere</h2>
      <p>You can find occasional posts on <a href="#">Twitter / X</a>, longer threads on <a href="#">LinkedIn</a>, and a complete archive on the <a href="#">Essays</a> page.</p>
    </div>
  </div>
);

function App() {
  const [route, setRoute] = useState(() => {
    try { return JSON.parse(localStorage.getItem('az-route')) || { screen: 'home' }; } catch { return { screen: 'home' }; }
  });
  const [theme, setTheme] = useState(() => localStorage.getItem('az-theme') || 'light');
  useEffect(() => { localStorage.setItem('az-route', JSON.stringify(route)); }, [route]);
  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); localStorage.setItem('az-theme', theme); }, [theme]);
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  const nav = (key) => {
    if (key === 'home' || key === 'essays') setRoute({ screen: 'home' });
    else if (key === 'about') setRoute({ screen: 'about' });
    else setRoute({ screen: 'category', category: key });
  };
  const openArticle = (id) => setRoute({ screen: 'article', id });
  const back = () => setRoute({ screen: 'home' });

  let current = 'essays';
  if (route.screen === 'about') current = 'about';
  else if (route.screen === 'category') current = route.category;

  let body;
  if (route.screen === 'home') body = <HomeScreen onOpen={openArticle} />;
  else if (route.screen === 'category') body = <CategoryScreen category={route.category} onOpen={openArticle} />;
  else if (route.screen === 'article') body = <ArticleScreen id={route.id} onBack={back} />;
  else if (route.screen === 'about') body = <AboutScreen />;

  return (<>
    <Nav current={current} onNav={nav} theme={theme} onToggleTheme={() => setTheme(theme === 'dark' ? 'light' : 'dark')} />
    {body}
    <Footer />
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
