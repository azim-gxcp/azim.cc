<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <pattern id="tess" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="currentColor" stroke-width="0.8">
        
        <polygon points="50,10 70,30 70,60 50,80 30,60 30,30"></polygon>
        <polygon points="0,10 20,30 20,60 0,80"></polygon>
        <polygon points="100,10 80,30 80,60 100,80"></polygon>
        <polygon points="50,60 70,80 50,100 30,80"></polygon>
        <polygon points="50,0 30,-20 50,-40 70,-20"></polygon>
        <line x1="30" y1="30" x2="0" y2="30"></line>
        <line x1="70" y1="30" x2="100" y2="30"></line>
        <line x1="30" y1="60" x2="0" y2="60"></line>
        <line x1="70" y1="60" x2="100" y2="60"></line>
      </g>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#tess)"></rect>
</svg>