}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--fg1);font-family:var(--font-body);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{padding:24px;width:700px}
a{color:var(--brand);text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:.22em;text-decoration-color:color-mix(in oklab,currentColor 35%,transparent)}
.row{display:flex}.col{display:flex;flex-direction:column}
.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-5{gap:24px}.gap-6{gap:32px}
.swatch{display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;min-height:80px;border-radius:var(--radius-md);font-family:var(--font-mono);font-size:11px;line-height:1.3;border:1px solid transparent}
.swatch .name{font-weight:600}.swatch .hex{opacity:.85}
.label{font-family:var(--font-body);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3)}
[lang="ar"],.arabic{font-family:var(--font-arabic);font-size:1.15em;line-height:1.85;direction:rtl;unicode-bidi:plaintext}
